name: Test Tutorial Pipelines

on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: "0 9 * * *"
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-pipelines:
    runs-on: ubuntu-latest
    env:
      ZENML_DEBUG: true
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_LOGGING_VERBOSITY: INFO
      UV_HTTP_TIMEOUT: 600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          source $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-tutorial-${{ runner.os }}-3.12-${{ github.run_id }}
          restore-keys: |
            uv-tutorial-${{ runner.os }}-3.12-
      - name: Create virtual environment
        run: |
          uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install --upgrade pip
          uv pip install zenml[server] --upgrade
          uv pip install -r requirements.txt

      - name: Initialize ZenML
        run: |
          source .venv/bin/activate
          zenml init
          zenml integration install aws s3 -y

      - name: Run all tutorial pipelines
        id: run_all
        run: |
          source .venv/bin/activate
          failed=()
          for p in \
            "pipelines/hello_pipeline/hello_pipeline.py" \
            "pipelines/cache_pipeline/cache_pipeline.py" \
            "pipelines/fan_pipeline/fan_pipeline.py" \
            "pipelines/meta_pipeline/meta_pipeline.py" \
            "pipelines/param_pipeline/param_pipeline.py" \
            "pipelines/robust_pipeline/robust_pipeline.py" \
            "pipelines/io_pipeline/io_pipeline.py" \
            "pipelines/tagged_pipeline/tagged_pipeline.py" \
            "pipelines/viz_pipeline/viz_pipeline.py" \
            "pipelines/yaml_pipeline/yaml_pipeline.py"; do

            echo "Running $p…"
              if [[ "$p" == *"robust_pipeline/robust_pipeline.py" ]]; then
                PYTHONPATH=$GITHUB_WORKSPACE:$PYTHONPATH python "$p" || echo "⚠  robust_pipeline demo: failure expected"
              else
                PYTHONPATH=$GITHUB_WORKSPACE:$PYTHONPATH python "$p" || failed+=("$p")
              fi
            done

          if [ "${#failed[@]}" -gt 0 ]; then
            echo "Failed pipelines:"
            printf " - %s\n" "${failed[@]}"
            exit 1
          fi

  notify-discord:
    needs: test-pipelines
    if: ${{ failure() }}
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification on failure
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_SRE }}
        with:
          args: |
            **Pipeline Test Failure Alert**

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}

            One or more tutorial pipelines failed with the latest ZenML version.
            Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
